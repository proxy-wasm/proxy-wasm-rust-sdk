services:
  envoy:
    image: envoyproxy/envoy:v1.34-latest
    hostname: envoy
    command:
      - /usr/local/bin/envoy
      - -c
      - /etc/envoy/envoy.yaml
      - -l
      - info
      - --service-cluster
      - proxy
    depends_on:
      - httpbin
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
      - ./target/wasm32-wasip1/release:/etc/envoy/proxy-wasm-plugins
    networks:
      - envoy-tcp-routing
    ports:
      - "10000:10000"

  httpbin:
    image: mccutchen/go-httpbin:v2.15.0
    hostname: httpbin
    networks:
      - envoy-tcp-routing

networks:
  envoy-tcp-routing: {}
